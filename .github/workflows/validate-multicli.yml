name: Validate Multi-CLI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install

      - name: Verify version sync
        run: bun run versions:check

      - name: Validate manifests and structure
        run: bun run validate

      - name: Build platform artifacts
        run: bun run build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-orchestrator-dist
          path: dist/
