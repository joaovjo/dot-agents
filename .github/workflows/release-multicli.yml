name: Release Multi-CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install

      - name: Ensure version matches tag
        run: |
          bun scripts/sync-versions.ts --check
          VERSION=$(bun -e "const manifest = JSON.parse(await Bun.file('plugins/nexus-orchestrator/.plugin/plugin.json').text()); console.log(manifest.version);")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: manifest=$VERSION tag=$TAG"
            exit 1
          fi

      - name: Validate and build
        run: bun run validate && bun run build

      - name: Package artifacts
        run: |
          VERSION=$(bun -e "const manifest = JSON.parse(await Bun.file('plugins/nexus-orchestrator/.plugin/plugin.json').text()); console.log(manifest.version);")
          mkdir -p release
          tar -czf release/nexus-orchestrator-copilot-${VERSION}.tar.gz -C dist nexus-orchestrator-copilot
          tar -czf release/nexus-orchestrator-gemini-${VERSION}.tar.gz -C dist nexus-orchestrator-gemini
          tar -czf release/nexus-orchestrator-claude-${VERSION}.tar.gz -C dist nexus-orchestrator-claude

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
          generate_release_notes: true
